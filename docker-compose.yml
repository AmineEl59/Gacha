services:

  mongodb:
    image: mongo:7
    container_name: projetapi-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./data/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

  authapi:
    build: ./authapi
    container_name: authapi-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mongodb

  playerapi:
    build: ./playerapi
    container_name: playerapi-app
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - AUTH_API_URL=http://authapi:8080
      - MONSTER_API_URL=http://monsterapi:8082
    depends_on:
      - mongodb
      - authapi
      - monsterapi

  monsterapi:
    build: ./monsterapi
    container_name: monsterapi-app
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - AUTH_API_URL=http://authapi:8080
    depends_on:
      - mongodb
      - authapi

  invocationapi:
    build: ./invocationapi
    container_name: invocationapi-app
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - AUTH_API_URL=http://authapi:8080
      - MONSTER_API_URL=http://monsterapi:8082
      - PLAYER_API_URL=http://playerapi:8081
    depends_on:
      - mongodb
      - authapi
      - monsterapi
      - playerapi

volumes:
  mongo-data:
