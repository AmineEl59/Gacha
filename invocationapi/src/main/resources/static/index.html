<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gacha Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

  /* ── Login ── */
  #loginSection {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .login-box {
    background: #16213e; padding: 40px; border-radius: 12px; width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .login-box h1 { text-align: center; margin-bottom: 24px; color: #e94560; font-size: 2rem; }

  /* ── App ── */
  #appSection { display: none; }
  header {
    background: #16213e; padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid #e94560;
  }
  header h2 { color: #e94560; }
  #userInfo { font-size: 0.9rem; color: #aaa; }

  nav { background: #0f3460; display: flex; }
  nav button {
    flex: 1; padding: 14px; background: none; border: none; color: #aaa;
    cursor: pointer; font-size: 1rem; border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  nav button:hover { color: #fff; background: rgba(255,255,255,0.05); }
  nav button.active { color: #e94560; border-bottom-color: #e94560; }

  .tab { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }
  .tab.active { display: block; }

  /* ── Forms ── */
  input, select {
    width: 100%; padding: 10px 12px; margin: 8px 0; border-radius: 6px;
    border: 1px solid #334; background: #0f1923; color: #eee; font-size: 0.95rem;
  }
  input:focus, select:focus { outline: none; border-color: #e94560; }

  .btn {
    padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 0.95rem; font-weight: bold; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #e94560; color: #fff; width: 100%; margin-top: 8px; }
  .btn-secondary { background: #0f3460; color: #fff; }
  .btn-small { padding: 6px 14px; font-size: 0.85rem; }

  /* ── Cards ── */
  .card {
    background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 16px;
    border: 1px solid #223;
  }
  .card h3 { color: #e94560; margin-bottom: 12px; }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px;
    margin-top: 10px;
  }
  .stat-box {
    background: #0f3460; border-radius: 8px; padding: 10px; text-align: center;
  }
  .stat-box .label { font-size: 0.75rem; color: #aaa; }
  .stat-box .value { font-size: 1.3rem; font-weight: bold; color: #fff; }

  .xp-bar-bg {
    background: #0f1923; border-radius: 4px; height: 10px; margin: 8px 0; overflow: hidden;
  }
  .xp-bar { background: #e94560; height: 100%; transition: width 0.4s; }

  .monster-card {
    background: #16213e; border: 1px solid #334; border-radius: 10px;
    padding: 16px; margin-bottom: 12px;
  }
  .monster-card h4 { color: #fff; margin-bottom: 8px; }
  .element-badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem;
    font-weight: bold; margin-left: 8px;
  }
  .FIRE { background: #c0392b; } .WATER { background: #2980b9; }
  .WIND { background: #27ae60; } .EARTH { background: #8e6b3e; }
  .LIGHTNING { background: #f39c12; color: #000; }

  .skill-list { margin-top: 8px; }
  .skill-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid #334; font-size: 0.9rem;
  }
  .skill-item:last-child { border-bottom: none; }

  .invoc-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: #0f1923; border-radius: 8px; margin-bottom: 8px;
  }
  .status-badge {
    padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold;
  }
  .COMPLETED { background: #27ae60; } .PENDING { background: #f39c12; color: #000; }
  .MONSTER_CREATED { background: #2980b9; }

  .combat-result { margin-top: 16px; }
  .combat-log {
    background: #0f1923; border-radius: 8px; padding: 12px; max-height: 300px;
    overflow-y: auto; font-size: 0.85rem; line-height: 1.6;
  }
  .turn-header { color: #e94560; font-weight: bold; margin-top: 8px; }
  .turn-action { color: #ccc; padding-left: 12px; }

  .combat-history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: #0f1923; border-radius: 8px; margin-bottom: 8px;
    cursor: pointer;
  }
  .combat-history-item:hover { background: #162033; }

  .btn-mode-active { background: #e94560 !important; color: #fff !important; }

  .error { color: #e94560; margin-top: 8px; font-size: 0.9rem; }
  .success { color: #27ae60; margin-top: 8px; font-size: 0.9rem; }
  .loading { color: #aaa; font-style: italic; }

  .section-title {
    font-size: 1.3rem; font-weight: bold; margin-bottom: 16px; color: #e94560;
    border-bottom: 1px solid #334; padding-bottom: 8px;
  }
  .row { display: flex; gap: 16px; }
  .row > * { flex: 1; }
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════════════════ -->
<div id="loginSection">
  <div class="login-box">
    <h1>🎮 Gacha</h1>
    <input type="text" id="loginUsername" placeholder="Nom d'utilisateur">
    <input type="password" id="loginPassword" placeholder="Mot de passe">
    <button class="btn btn-primary" onclick="login()">Connexion</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════════════ -->
<div id="appSection">
  <header>
    <h2>🎮 Gacha Game</h2>
    <div id="userInfo"></div>
  </header>
  <nav>
    <button class="active" onclick="showTab('profil')">👤 Profil</button>
    <button onclick="showTab('invocations')">✨ Invocations</button>
    <button onclick="showTab('monstres')">🐉 Monstres</button>
    <button onclick="showTab('combats')">⚔️ Combats</button>
  </nav>

  <!-- ── PROFIL ── -->
  <div id="tabProfil" class="tab active">
    <div class="section-title">Mon Profil</div>
    <div id="profilContent" class="loading">Chargement...</div>
  </div>

  <!-- ── INVOCATIONS ── -->
  <div id="tabInvocations" class="tab">
    <div class="section-title">Invocations</div>
    <div class="card">
      <h3>Invoquer un monstre</h3>
      <button class="btn btn-primary" onclick="invoquer()">✨ Invoquer</button>
      <div id="invocResult"></div>
    </div>
    <div class="section-title" style="margin-top:24px">Historique</div>
    <div id="invocHistory" class="loading">Chargement...</div>
  </div>

  <!-- ── MONSTRES ── -->
  <div id="tabMonstres" class="tab">
    <div class="section-title">Mes Monstres</div>
    <div id="monstresContent" class="loading">Chargement...</div>
  </div>

  <!-- ── COMBATS ── -->
  <div id="tabCombats" class="tab">
    <div class="section-title">Lancer un combat</div>
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button id="btnModeSolo" class="btn btn-primary btn-small" onclick="setCombatMode('solo')" style="flex:1">⚔️ Duel personnel</button>
        <button id="btnModePvp" class="btn btn-secondary btn-small" onclick="setCombatMode('pvp')" style="flex:1">🌐 PvP</button>
      </div>

      <div id="pvpOpponentSection" style="display:none;margin-bottom:14px">
        <label style="color:#aaa;font-size:0.9rem">Nom du joueur adverse</label>
        <div style="display:flex;gap:8px;margin-top:4px">
          <input type="text" id="opponentUsername" placeholder="ex: bob" style="margin:0">
          <button class="btn btn-secondary btn-small" onclick="chargerAdversaire()" style="width:auto;white-space:nowrap">Chercher</button>
        </div>
        <div id="opponentStatus" style="font-size:0.85rem;margin-top:6px"></div>
      </div>

      <div class="row">
        <div>
          <label style="color:#aaa;font-size:0.9rem" id="labelM1">Ton monstre</label>
          <select id="combatM1"></select>
        </div>
        <div>
          <label style="color:#aaa;font-size:0.9rem" id="labelM2">Monstre 2</label>
          <select id="combatM2"></select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="lancerCombat()" style="margin-top:12px">⚔️ Combattre</button>
      <div id="combatResult"></div>
    </div>
    <div class="section-title" style="margin-top:24px">Historique des combats</div>
    <div id="combatHistory" class="loading">Chargement...</div>
  </div>
</div>

<script>
const AUTH    = 'http://localhost:8080';
const PLAYER  = 'http://localhost:8081';
const MONSTER = 'http://localhost:8082';
const COMBAT  = 'http://localhost:8084';

let token = null;
let username = null;
let myMonsters = [];
let opponentMonsters = [];
let combatMode = 'solo'; // 'solo' | 'pvp'

// ══ Utilitaires ═══════════════════════════════════════════════════════

function api(url, method = 'GET', body = null, needAuth = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (needAuth && token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(url, { method, headers, body: body ? JSON.stringify(body) : null })
    .then(r => {
      if (r.ok) return r.json();
      return r.text().then(text => {
        try { const e = JSON.parse(text); return Promise.reject(e.message || r.status); }
        catch { return Promise.reject(r.status); }
      });
    });
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  event.target.classList.add('active');
  if (name === 'profil')      loadProfil();
  if (name === 'invocations') loadInvocations();
  if (name === 'monstres')    loadMonstres();
  if (name === 'combats')     loadCombats();
}

// ══ Auth ══════════════════════════════════════════════════════════════

function startSession(t, u) {
  token = t;
  username = u;
  localStorage.setItem('token', t);
  localStorage.setItem('username', u);
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('appSection').style.display = 'block';
  document.getElementById('userInfo').innerHTML = `👤 ${username} <button onclick="logout()" style="margin-left:12px;background:none;border:1px solid #555;color:#aaa;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:0.8rem">Déconnexion</button>`;
  loadProfil();
}

function logout() {
  token = null;
  username = null;
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  document.getElementById('appSection').style.display = 'none';
  document.getElementById('loginSection').style.display = 'flex';
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').textContent = '';
}

async function login() {
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value.trim();
  document.getElementById('loginError').textContent = '';
  if (!u || !p) { document.getElementById('loginError').textContent = 'Remplis tous les champs.'; return; }
  try {
    const data = await api(`${AUTH}/api/auth/login`, 'POST', { username: u, password: p }, false);
    startSession(data.token, u);
  } catch (e) {
    const msg = (e instanceof TypeError)
      ? 'Impossible de contacter le serveur. Vérifie que Docker tourne et que les services sont démarrés.'
      : 'Identifiants incorrects.';
    document.getElementById('loginError').textContent = msg;
  }
}

// Restaurer la session au chargement de la page
(async function restoreSession() {
  const savedToken = localStorage.getItem('token');
  const savedUsername = localStorage.getItem('username');
  if (!savedToken || !savedUsername) return;
  try {
    // Vérifier que le token est encore valide
    await fetch(`${AUTH}/api/auth/validate`, {
      headers: { 'Authorization': 'Bearer ' + savedToken }
    }).then(r => { if (!r.ok) throw new Error('invalid'); });
    startSession(savedToken, savedUsername);
  } catch {
    localStorage.removeItem('token');
    localStorage.removeItem('username');
  }
})();

// ══ Profil ════════════════════════════════════════════════════════════

async function loadProfil() {
  const el = document.getElementById('profilContent');
  el.innerHTML = '<span class="loading">Chargement...</span>';
  try {
    const player = await api(`${PLAYER}/api/players/${username}`);
    const xpPct = Math.min(100, Math.round(player.experience / player.experienceThreshold * 100));
    el.innerHTML = `
      <div class="card">
        <h3>${username}</h3>
        <div class="stats-grid">
          <div class="stat-box"><div class="label">Niveau</div><div class="value">${player.level}</div></div>
          <div class="stat-box"><div class="label">XP</div><div class="value">${player.experience}/${player.experienceThreshold}</div></div>
          <div class="stat-box"><div class="label">Monstres</div><div class="value">${player.monsters.length}/${player.maxMonsters}</div></div>
        </div>
        <div style="margin-top:12px">
          <div style="font-size:0.85rem;color:#aaa">Progression XP</div>
          <div class="xp-bar-bg"><div class="xp-bar" style="width:${xpPct}%"></div></div>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input type="number" id="xpAmount" placeholder="Quantité XP" min="1" style="width:150px;margin:0">
          <button class="btn btn-secondary btn-small" onclick="gainerXPJoueur()">+ Gagner XP</button>
          <button class="btn btn-secondary btn-small" onclick="levelUpJoueur()" ${player.level >= 50 ? 'disabled style="opacity:0.4"' : ''}>⬆ Level Up manuel</button>
        </div>
        <div id="profilMsg" style="margin-top:6px;font-size:0.85rem"></div>
      </div>
      <div class="section-title" style="margin-top:16px">Mes monstres (${player.monsters.length})</div>
      <div id="profilMonsters"><span class="loading">Chargement des monstres...</span></div>
    `;
    loadProfilMonsters(player.monsters);
  } catch (e) {
    el.innerHTML = `<div class="error">Erreur : ${e}</div>`;
  }
}

async function gainerXPJoueur() {
  const input = document.getElementById('xpAmount');
  const amount = parseInt(input.value);
  const msg = document.getElementById('profilMsg');
  if (!amount || amount <= 0) { msg.innerHTML = '<span class="error">Entrez une quantité valide.</span>'; return; }
  try {
    const player = await api(`${PLAYER}/api/players/${username}/experience`, 'POST', { amount });
    msg.innerHTML = `<span class="success">+${amount} XP ! Niveau ${player.level} — XP : ${player.experience}/${player.experienceThreshold}</span>`;
    input.value = '';
    loadProfil();
  } catch (e) { msg.innerHTML = `<span class="error">Erreur : ${e}</span>`; }
}

async function levelUpJoueur() {
  const msg = document.getElementById('profilMsg');
  try {
    const player = await api(`${PLAYER}/api/players/${username}/levelup`, 'POST');
    msg.innerHTML = `<span class="success">Niveau atteint : ${player.level} ! Max monstres : ${player.maxMonsters}</span>`;
    loadProfil();
  } catch (e) { msg.innerHTML = `<span class="error">Erreur : ${e}</span>`; }
}

async function loadProfilMonsters(ids) {
  const el = document.getElementById('profilMonsters');
  if (!ids || ids.length === 0) { el.innerHTML = '<div style="color:#aaa">Aucun monstre. Lance une invocation !</div>'; return; }
  try {
    const monsters = await Promise.all(ids.map(id => api(`${MONSTER}/api/monsters/${id}`)));
    myMonsters = monsters;
    el.innerHTML = monsters.map(m => monsterCardHtml(m, true, 'profil')).join('');
    updateCombatSelects();
  } catch (e) {
    el.innerHTML = `<div class="error">Erreur chargement monstres.</div>`;
  }
}

// ══ Invocations ═══════════════════════════════════════════════════════

async function invoquer() {
  const el = document.getElementById('invocResult');
  el.innerHTML = '<span class="loading">Invocation en cours...</span>';
  try {
    const inv = await api('/api/invocations', 'POST');
    el.innerHTML = `
      <div class="card" style="margin-top:12px">
        <h3>✨ ${inv.baseMonsterName} invoqué !</h3>
        <div class="stats-grid">
          <div class="stat-box"><div class="label">Type</div><div class="value">${inv.elementType}</div></div>
          <div class="stat-box"><div class="label">HP</div><div class="value">${inv.hp}</div></div>
          <div class="stat-box"><div class="label">ATK</div><div class="value">${inv.atk}</div></div>
          <div class="stat-box"><div class="label">DEF</div><div class="value">${inv.def}</div></div>
          <div class="stat-box"><div class="label">VIT</div><div class="value">${inv.vit}</div></div>
        </div>
        <div style="margin-top:8px;font-size:0.85rem;color:#aaa">
          Statut : <span class="status-badge ${inv.status}">${inv.status}</span>
        </div>
      </div>
    `;
    loadInvocations();
  } catch (e) {
    el.innerHTML = `<div class="error">Erreur : ${e}</div>`;
  }
}

async function loadInvocations() {
  const el = document.getElementById('invocHistory');
  try {
    const list = await api('/api/invocations');
    if (list.length === 0) { el.innerHTML = '<div style="color:#aaa">Aucune invocation.</div>'; return; }
    el.innerHTML = [...list].reverse().map(inv => `
      <div class="invoc-item">
        <div>
          <strong>${inv.baseMonsterName}</strong>
          <span class="element-badge ${inv.elementType}">${inv.elementType}</span>
        </div>
        <div style="font-size:0.85rem;color:#aaa">
          HP:${inv.hp} ATK:${inv.atk} DEF:${inv.def} VIT:${inv.vit}
        </div>
        <span class="status-badge ${inv.status}">${inv.status}</span>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = `<div class="error">Erreur chargement historique.</div>`;
  }
}

// ══ Monstres ══════════════════════════════════════════════════════════

async function loadMonstres() {
  const el = document.getElementById('monstresContent');
  el.innerHTML = '<span class="loading">Chargement...</span>';
  try {
    const ids = await api(`${PLAYER}/api/players/${username}/monsters`);
    if (!ids || ids.length === 0) { el.innerHTML = '<div style="color:#aaa">Aucun monstre. Lance une invocation !</div>'; return; }
    const monsters = await Promise.all(ids.map(id => api(`${MONSTER}/api/monsters/${id}`)));
    myMonsters = monsters;
    updateCombatSelects();
    el.innerHTML = monsters.map(m => monsterCardHtml(m, true, 'monstres')).join('');
  } catch (e) {
    el.innerHTML = `<div class="error">Erreur : ${e}</div>`;
  }
}

function monsterCardHtml(m, withActions, source = 'monstres') {
  const skills = (m.skills || []).map((s, i) => `
    <div class="skill-item">
      <span>Compétence ${i+1}</span>
      <span style="color:#aaa">DMG: ${s.baseDamage} | ${s.statType} x${s.statRatio} | CD: ${s.cooldown}</span>
      <span style="color:#e94560">Niv. ${s.improvementLevel}/${s.maxImprovementLevel}</span>
      ${withActions && m.skillPoints > 0 && s.improvementLevel < s.maxImprovementLevel ? `<button class="btn btn-small btn-secondary" onclick="ameliorerSkill('${m.id}',${i},'${source}')">⬆ Améliorer</button>` : ''}
    </div>
  `).join('');

  return `
    <div class="monster-card" id="monster-${m.id}">
      <h4>
        ${m.ownerUsername === username ? '🐉' : '👾'}
        Niveau ${m.level}
        <span class="element-badge ${m.elementType}">${m.elementType}</span>
        ${m.skillPoints > 0 ? `<span style="color:#f39c12;font-size:0.85rem">  ✦ ${m.skillPoints} point(s) de compétence</span>` : ''}
      </h4>
      <div class="stats-grid">
        <div class="stat-box"><div class="label">HP</div><div class="value">${m.hp}</div></div>
        <div class="stat-box"><div class="label">ATK</div><div class="value">${m.atk}</div></div>
        <div class="stat-box"><div class="label">DEF</div><div class="value">${m.def}</div></div>
        <div class="stat-box"><div class="label">VIT</div><div class="value">${m.vit}</div></div>
        <div class="stat-box"><div class="label">XP</div><div class="value">${m.experience}/${m.experienceThreshold}</div></div>
      </div>
      <div class="skill-list">${skills}</div>
      ${withActions ? `
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-small btn-secondary" onclick="donnerXP('${m.id}', 50)">+50 XP</button>
          <button class="btn btn-small btn-secondary" onclick="donnerXP('${m.id}', 100)">+100 XP</button>
          <button class="btn btn-small" style="background:#c0392b;color:#fff" onclick="supprimerMonstre('${m.id}')">🗑 Supprimer</button>
        </div>
      ` : ''}
    </div>
  `;
}

async function donnerXP(monsterId, amount) {
  try {
    await api(`${MONSTER}/api/monsters/${monsterId}/experience`, 'POST', { amount });
    loadMonstres();
  } catch (e) { alert('Erreur XP : ' + e); }
}

async function ameliorerSkill(monsterId, skillIndex, source = 'monstres') {
  try {
    await api(`${MONSTER}/api/monsters/${monsterId}/skills/${skillIndex}/improve`, 'POST');
    if (source === 'profil') loadProfil();
    else loadMonstres();
  } catch (e) { alert('Erreur amélioration : ' + e); }
}

async function supprimerMonstre(monsterId) {
  if (!confirm('Supprimer ce monstre définitivement ?')) return;
  try {
    await fetch(`${PLAYER}/api/players/${username}/monsters/${monsterId}`, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    loadMonstres();
    loadProfil();
  } catch (e) { alert('Erreur suppression : ' + e); }
}

// ══ Combats ═══════════════════════════════════════════════════════════

function updateCombatSelects() {
  const myOpts = myMonsters.map(m =>
    `<option value="${m.id}">Niv.${m.level} ${m.elementType} (HP:${m.hp} ATK:${m.atk})</option>`
  ).join('');
  document.getElementById('combatM1').innerHTML = myOpts;

  if (combatMode === 'pvp') {
    const oppOpts = opponentMonsters.length
      ? opponentMonsters.map(m =>
          `<option value="${m.id}">Niv.${m.level} ${m.elementType} (HP:${m.hp} ATK:${m.atk})</option>`
        ).join('')
      : '<option value="" disabled>— Cherche un adversaire —</option>';
    document.getElementById('combatM2').innerHTML = oppOpts;
  } else {
    document.getElementById('combatM2').innerHTML = myOpts;
  }
}

function setCombatMode(mode) {
  combatMode = mode;
  const isPvp = mode === 'pvp';
  document.getElementById('pvpOpponentSection').style.display = isPvp ? 'block' : 'none';
  document.getElementById('labelM2').textContent = isPvp ? 'Monstre adverse' : 'Monstre 2';
  document.getElementById('btnModeSolo').classList.toggle('btn-mode-active', !isPvp);
  document.getElementById('btnModePvp').classList.toggle('btn-mode-active', isPvp);
  document.getElementById('btnModeSolo').classList.toggle('btn-secondary', isPvp);
  document.getElementById('btnModePvp').classList.toggle('btn-secondary', !isPvp);
  if (!isPvp) { opponentMonsters = []; document.getElementById('opponentStatus').textContent = ''; }
  updateCombatSelects();
}

async function chargerAdversaire() {
  const opp = document.getElementById('opponentUsername').value.trim();
  const statusEl = document.getElementById('opponentStatus');
  if (!opp) { statusEl.innerHTML = '<span class="error">Entre un nom de joueur.</span>'; return; }
  if (opp === username) { statusEl.innerHTML = '<span class="error">Tu ne peux pas combattre contre toi-même ici — utilise le mode Duel personnel.</span>'; return; }
  statusEl.innerHTML = '<span class="loading">Recherche...</span>';
  try {
    const ids = await api(`${PLAYER}/api/players/${opp}/monsters`);
    if (!ids || ids.length === 0) { statusEl.innerHTML = '<span class="error">Ce joueur n\'a aucun monstre.</span>'; return; }
    opponentMonsters = await Promise.all(ids.map(id => api(`${MONSTER}/api/monsters/${id}`)));
    statusEl.innerHTML = `<span class="success">✓ ${opp} — ${opponentMonsters.length} monstre(s) disponible(s)</span>`;
    updateCombatSelects();
  } catch (e) {
    statusEl.innerHTML = `<span class="error">Joueur introuvable.</span>`;
    opponentMonsters = [];
    updateCombatSelects();
  }
}

async function lancerCombat() {
  const m1 = document.getElementById('combatM1').value;
  const m2 = document.getElementById('combatM2').value;
  const el = document.getElementById('combatResult');
  el.innerHTML = '<span class="loading">Combat en cours...</span>';
  try {
    const log = await api(`${COMBAT}/api/combats`, 'POST', { monster1Id: m1, monster2Id: m2 });
    el.innerHTML = combatLogHtml(log);
    loadCombatHistory();
    // Rafraîchir les monstres pour voir l'XP gagné
    const ids = await api(`${PLAYER}/api/players/${username}/monsters`);
    const monsters = await Promise.all(ids.map(id => api(`${MONSTER}/api/monsters/${id}`)));
    myMonsters = monsters;
    updateCombatSelects();
  } catch (e) {
    el.innerHTML = `<div class="error">Erreur : ${e}</div>`;
  }
}

function combatLogHtml(log) {
  const winner = log.winnerId
    ? `🏆 Gagnant : <strong>${log.winnerOwner}</strong> (monstre ${log.winnerId})`
    : '⚖️ Match nul — les deux monstres sont tombés';

  const turns = (log.turns || []).map(t => `
    <div class="turn-header">Tour ${t.turnNumber}</div>
    ${(t.actions || []).map(a => `<div class="turn-action">→ ${a}</div>`).join('')}
  `).join('');

  return `
    <div class="combat-result">
      <div class="card">
        <h3>Combat #${log.combatNumber}</h3>
        <p style="margin-bottom:10px">${winner}</p>
        <div class="combat-log">${turns}</div>
      </div>
    </div>
  `;
}

async function loadCombats() {
  setCombatMode(combatMode);
  updateCombatSelects();
  loadCombatHistory();
}

async function loadCombatHistory() {
  const el = document.getElementById('combatHistory');
  try {
    const list = await api(`${COMBAT}/api/combats`);
    if (list.length === 0) { el.innerHTML = '<div style="color:#aaa">Aucun combat.</div>'; return; }
    el.innerHTML = [...list].reverse().map(log => `
      <div class="combat-history-item" onclick="voirCombat(${log.combatNumber})">
        <div>
          <strong>Combat #${log.combatNumber}</strong>
          <span style="color:#aaa;font-size:0.85rem;margin-left:8px">${log.turns ? log.turns.length : 0} tours</span>
        </div>
        <div style="font-size:0.85rem">
          ${log.winnerId ? `🏆 ${log.winnerOwner}` : '⚖️ Nul'}
        </div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = `<div class="error">Erreur chargement historique.</div>`;
  }
}

async function voirCombat(combatNumber) {
  try {
    const log = await api(`${COMBAT}/api/combats/${combatNumber}`);
    document.getElementById('combatResult').innerHTML = combatLogHtml(log);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) { alert('Erreur : ' + e); }
}
</script>
</body>
</html>
